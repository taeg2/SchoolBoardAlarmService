version: '3.8'

services:
  # 1. 데이터베이스 컨테이너
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    container_name: school_alarm_db
    restart: always
    environment:
      MYSQL_DATABASE: school_alarm
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - db_data:/var/lib/mysql
    # 🌟 여기에 헬스체크 추가! (MySQL이 살아있는지 5초마다 체크)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. 스프링 부트 애플리케이션 컨테이너
  app:
    image: taeg4/school-alarm:v3
    container_name: school_alarm_app
    restart: always
    # 🌟 무조건 DB가 완전히 건강해진(healthy) 후에 켜지도록 조건 세분화!
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/school_alarm?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TELEGRAM_BOT_NAME: ${TELEGRAM_BOT_NAME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"

  # 3. 대문 역할 및 HTTPS 담당 (Nginx)
  nginx:
    image: nginx:latest
    container_name: school_alarm_nginx
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443" # 👈 HTTPS용 443 포트도 확실하게 열려있는지 확인!
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # 주석 처리하려던 부분 대신, 실제 우분투의 Let's Encrypt 경로를 바로 꽂아줍니다 (읽기 전용:ro)
      - /etc/letsencrypt:/etc/letsencrypt:ro

# 도커가 관리하는 물리적 하드디스크 공간 선언
volumes:
  db_data:
    external: true
    name: taeg04_db_data